<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - Page 2</title>
    <style>
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: Arial, sans-serif;
            background-image: url(461a0d27a3a739233facb5be9ec2d515.jpg);
            background-position: center;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background-color: rgb(249, 243, 243);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: red;
            position: absolute;
        }

        .login-signup {
            position: absolute;
            top: 50px;
            left: 140px;
        }

        .login-signup button {
            margin-right: 10px;
            background-color: rgb(255, 255, 255);
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            color: rgb(11, 11, 11);
            border: none;
        }
         /* Account Dropdown */
         .account-dropdown {
            position: relative;
            display: flex;
            align-items: center;
        }

        .account-dropdown-content {
            display: none;
            position: absolute;
            background-color: rgb(249, 243, 243);
            min-width: 150px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
            top: 100%;
            left: 0;
        }

        .account-dropdown-content button {
            width: 100%;
            padding: 10px;
            text-align: left;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-weight: bold;
            color: black;
        }

        .account-dropdown-content button:hover {
            background-color: #ddd;
        }

        .account-dropdown:hover .account-dropdown-content {
            display: block;
        }

        .account-logo {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a, .account-dropdown button {
            color: rgb(19, 19, 19);
            text-decoration: none;
            padding: 10px 15px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
        }

        nav a:hover, .account-dropdown button:hover {
            color: red;
        }

        .hero {
            background: url('background.jpg') no-repeat center center/cover;
            padding: 20px;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 28px;
        }

        /* Category Buttons */
        .category-btn.active {
            background: red;
            font-weight: bold;
            border: 2px solid white;
        }

        /* Search Box */
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 5px;
            overflow: hidden;
        }

        .search-box input {
            padding: 5px;
            border: none;
            outline: none;
        }

        .search-box button {
            background: rgba(231, 38, 38, 0.911);
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
        }

        .hero {
            background: url('background.jpg') no-repeat center center/cover;
            padding: 20px;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 28px;
        }

        /* Category Buttons */
        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .category-btn {
            background: rgb(149, 28, 36);
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
        }

        .category-btn.active {
            background: orange;
            font-weight: bold;
            border: 2px solid white;
        }

        /* Product Section */
        .products-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
        }

        .product {
            background: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            width: 220px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .product img {
            width: 100%;
            height: 180px;
            border-radius: 5px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product:hover img {
            transform: scale(1.5);
            box-shadow: 0 4px 8px rgba(155, 13, 13, 0.911);
            border: 3px solid white;
        }

        .product h3 {
            color: black;
            margin-top: 10px;
        }

        .product p {
            color: red;
            font-size: 16px;
        }

        .product button {
            background: rgb(149, 28, 36);
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            border-radius: 5px;
        }

        .product button:hover {
            background: red;
        }

        /* Eye Button */
        .eye-button {
            background: rgb(149, 28, 36);
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .eye-button:hover {
            background: red;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .pagination button {
            background: rgb(149, 28, 36);
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            margin: 0 5px;
            border-radius: 5px;
        }

        .pagination button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Footer */
        footer {
            background: white;
            color: rgb(13, 13, 13);
            padding: 10px;
            text-align: center;
            width: 100%;
            margin-top: auto;
        }
    </style>
</head>

<body>

<header>  
    <div class="logo"></div>
    <img src="WhatsApp Image 2025-02-16 at 10.27.00_46874477.jpg" width="100" height="100">
    
    <div class="login-signup">
        <button onclick="window.location.href='login.html'">Login</button>
        <button onclick="window.location.href='signup.html'">Signup</button>
    </div>
  
    <nav>
          <!-- Account Dropdown -->
          <div class="account-dropdown">
            <img src="097d3cf1d036e549d1caa10ad9268dfe.jpg" class="account-logo" alt="Account Logo">
            <button>Account</button>
            <div class="account-dropdown-content">
                <button onclick="showSwitchAccountDropdown()">Switch Account</button>
                <button onclick="addAnotherAccount()">Add Another Account</button>
                <button onclick="removeAccount()">Remove Account</button>
                <!-- Switch Account Dropdown (hidden by default) -->
                <div id="switch-account-dropdown" style="display: none;">
                    <select id="switch-account" onchange="switchAccount()">
                        <option value="">Select Account</option>
                    </select>
                </div>
            </div>
        <a href="Home.html">HOME</a>
        <a href="About us.html">ABOUT US</a>
        <a href="All Products.html">ALL PRODUCTS</a>
        <a href="Contact us.html">CONTACT US</a>
        <a href="Cart.html"> 🛒CART</a>
        <div class="search-box">
            <input type="text" placeholder="Search products...">
            <button>🔍</button>
        </div>
    </nav>
</header>

<section class="hero">
    <h1>CUSTOMIZED GIFTS 🎁</h1>
</section>

<!-- Categories Section -->
<div class="categories">
    <button class="category-btn" data-category="Customized Bottles" onclick="showProducts('Customized Bottles')">Customized Bottles</button>
    <button class="category-btn" data-category="Customized Boquets" onclick="showProducts('Customized Boquets')">Customized Boquets</button>
</div>

<!-- Products Section -->
<section class="products-container" id="products-list"></section>

<!-- Pagination -->
<div class="pagination" id="pagination">
    <button id="prev-page" onclick="window.location.href='All Products.html'">Previous Page</button>
    <button id="next-page" disabled>Next Page</button>
</div>

<footer>
    <p>&copy; 2025 Customized Gift Store. All Rights Reserved.</p>
</footer>

<script>
   const products = {
    "Customized Bottles": [
        { name: "Customized Photo Bottle", price: "LKR 2800", img: "2a37fd11f1a1868cb4df05bc4e3d4c7e.jpg" },
        { name: "Text Personalized Name Bottle", price: "LKR 1800", img: "4873a408d2e2a6661589ad6db169ac9b.jpg"},
        { name: "Custom Logo Bottle", price: "LKR 2500", img: "b290974e664fdf5fb7e774ae5666093c.jpg"}
    ],
    "Customized Boquets": [
        { name: "Customized Photo Boquets", price: "LKR 4500", img: "197f24d8f041013f9b0b096f0e841c2f.jpg" },
        { name: "Personalized Message Bouquet", price: "LKR 3000", img: "8fcb4392476e647aaa3b52a519352aa0.jpg" },
        
        
    ]
};
// Account Dropdown Functions
function showSwitchAccountDropdown() {
        const switchAccountDropdown = document.getElementById("switch-account-dropdown");
        const select = document.getElementById("switch-account");

        // Clear existing options
        select.innerHTML = '<option value="">Select Account</option>';

        // Populate dropdown with existing accounts
        const users = JSON.parse(localStorage.getItem("users")) || [];
        users.forEach(user => {
            const option = document.createElement("option");
            option.value = user.email;
            option.textContent = user.email;
            select.appendChild(option);
        });

        // Toggle dropdown visibility
        switchAccountDropdown.style.display = "block";
    }

    function switchAccount() {
        const selectedEmail = document.getElementById("switch-account").value;
        if (selectedEmail) {
            localStorage.setItem("loggedInEmail", selectedEmail);
            alert("Switched to account: " + selectedEmail);
            window.location.href = "account.html"; // Redirect to account page
        }
    }

    function addAnotherAccount() {
        alert("Redirecting to login page...");
        window.location.href = "login.html"; // Redirect to login page
    }

    function removeAccount() {
        const loggedInEmail = localStorage.getItem("loggedInEmail");
        if (loggedInEmail === "guest@example.com") {
            alert("Guest accounts cannot be removed. Please sign up to create an account.");
        } else {
            const confirmRemove = confirm("Are you sure you want to remove your account? This action cannot be undone.");
            if (confirmRemove) {
                let users = JSON.parse(localStorage.getItem("users")) || [];
                users = users.filter(user => user.email !== loggedInEmail);
                localStorage.setItem("users", JSON.stringify(users));
                localStorage.removeItem("loggedInEmail");
                alert("Account removed successfully. Redirecting to home page...");
                window.location.href = "Home.html";
            }
        }
    }

// Function to show products of the selected category
function showProducts(category) {
    const productList = document.getElementById("products-list");

    // Get products for the current category
    const categoryProducts = products[category] || [];

    // Generate product list with bold names
    productList.innerHTML = categoryProducts.map(product => `
        <div class="product">
            <img src="${product.img}" alt="${product.name}">
            <h3 style="font-weight: bold;">${product.name}</h3>
            <p>${product.price}</p>
            <button class="eye-button" onclick="viewProduct('${category}', '${product.name}')">👁️ View</button>
        </div>
    `).join('');

    // Highlight the selected category button
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-category') === category) {
            btn.classList.add('active');
        }
    });

    // Update the URL without reloading the page
    const url = new URL(window.location);
    url.searchParams.set('category', category);
    window.history.pushState({}, '', url);
}

// Function to view and customize the product
function viewProduct(category, productName,productImg,productPrice) {
    // Redirect to the customization page with product details
    window.location.href =  `Customize.html?category=${encodeURIComponent(category)}&product=${encodeURIComponent(productName)}&img=${encodeURIComponent(productImg)}&price=${encodeURIComponent(productPrice)}`;
}

// Load products based on the selected category when the page loads
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category") || "Customized Bottles"; // Default category is "Customized Bottles"
    showProducts(category);
};

// Function to show products of the selected category
function showProducts(category) {
    const productList = document.getElementById("products-list");

    // Get products for the current category
    const categoryProducts = products[category] || [];

    // Generate product list with bold names
    productList.innerHTML = categoryProducts.map(product => `
        <div class="product">
            <img src="${product.img}" alt="${product.name}">
            <h3 style="font-weight: bold;">${product.name}</h3>
            <p>${product.price}</p>
            <button class="eye-button" onclick="viewProduct('${category}', '${product.name}', '${product.img}', '${product.price}')">👁️ View</button>
        </div>
    `).join('');

    // Highlight the selected category button
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-category') === category) {
            btn.classList.add('active');
        }
    });
}
</script>

</body>
</html>
