<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Customized Gift Store</title>
    <style>
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: Arial, sans-serif;
            background-image: url(461a0d27a3a739233facb5be9ec2d515.jpg);
            background-position: center;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background-color: rgb(249, 243, 243);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: red;
            position: absolute;
        }

        .login-signup {
            position: absolute;
            top: 50px;
            left: 140px;
        }

        .login-signup button {
            margin-right: 10px;
            background-color: rgb(255, 255, 255);
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            color: rgb(11, 11, 11);
            border: none;
        }
         /* Account Dropdown */
         .account-dropdown {
            position: relative;
            display: flex;
            align-items: center;
        }

        .account-dropdown-content {
            display: none;
            position: absolute;
            background-color: rgb(249, 243, 243);
            min-width: 150px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
            top: 100%;
            left: 0;
        }

        .account-dropdown-content button {
            width: 100%;
            padding: 10px;
            text-align: left;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-weight: bold;
            color: black;
        }

        .account-dropdown-content button:hover {
            background-color: #ddd;
        }

        .account-dropdown:hover .account-dropdown-content {
            display: block;
        }

        .account-logo {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a, .account-dropdown button {
            color: rgb(19, 19, 19);
            text-decoration: none;
            padding: 10px 15px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
        }

        nav a:hover, .account-dropdown button:hover {
            color: red;
        }

        .hero {
            background: url('background.jpg') no-repeat center center/cover;
            padding: 20px;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 28px;
        }

        /* Cart Section */
        .cart-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .cart-items {
            flex: 1;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ccc;
            position: relative;
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            border-radius: 5px;
            margin-right: 10px;
        }

        .cart-item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .cart-item-details h3 {
            color: rgb(149, 28, 36);
            margin-bottom: 5px;
            font-size: 25px;
        }

        .cart-item-details .horizontal-details {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cart-item-details .horizontal-details p {
            color: black;
            margin-bottom: 5px;
            font-size: 20px;
        }

        .cart-item-details .customization-details {
            font-style: italic;
            color: #555;
            font-size: 15px;
            margin-top: 5px;
            font-weight: bold;
        }

        .quantity-adjust {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .quantity-adjust button {
            background: rgb(149, 28, 36);
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
        }

        .quantity-adjust input {
            width: 40px;
            text-align: center;
            margin: 0 5px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .remove-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 17px;
            border-radius: 5px;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .remove-btn:hover {
            background: darkred;
        }

        /* Delivery Note */
        .delivery-note {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
            font-size: 22px;
            color: rgb(149, 28, 36);
            font-weight: bold;
            text-align: center;
        }

        /* Total Amount Section */
        .total-amount {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: rgb(149, 28, 36);
        }

        /* Proceed Button */
        .proceed-btn {
            background: rgb(149, 28, 36);
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: calc(100% - 20px);
            font-size: 16px;
            border-radius: 5px;
            margin: 10px;
        }

        .proceed-btn:hover {
            background: red;
        }

        /* Footer */
        footer {
            background: white;
            color: rgb(13, 13, 13);
            padding: 10px;
            text-align: center;
            width: 100%;
            margin-top: auto;
        }
    </style>
</head>
<body>

<header>  
    <div class="logo"></div>
    <img src="WhatsApp Image 2025-02-16 at 10.27.00_46874477.jpg" width="100" height="100">
    
    <div class="login-signup">
        <button onclick="window.location.href='login.html'">Login</button>
        <button onclick="window.location.href='signup.html'">Signup</button>
    </div>
    
    <nav>
         <!-- Account Dropdown -->
         <div class="account-dropdown">
            <img src="097d3cf1d036e549d1caa10ad9268dfe.jpg" class="account-logo" alt="Account Logo">
            <button>Account</button>
            <div class="account-dropdown-content">
                <button onclick="showSwitchAccountDropdown()">Switch Account</button>
                <button onclick="addAnotherAccount()">Add Another Account</button>
                <button onclick="removeAccount()">Remove Account</button>
                <!-- Switch Account Dropdown (hidden by default) -->
                <div id="switch-account-dropdown" style="display: none;">
                    <select id="switch-account" onchange="switchAccount()">
                        <option value="">Select Account</option>
                    </select>
                </div>
            </div>
        <a href="Home.html">HOME</a>
        <a href="About us.html">ABOUT US</a>
        <a href="All Products.html">ALL PRODUCTS</a>
        <a href="Contact us.html">CONTACT US</a>
        <a href="Cart.html"> 🛒CART</a>
        <div class="search-box">
            <input type="text" placeholder="Search products...">
            <button>🔍</button>
        </div>
    </nav>
</header>

<!-- Cart Section -->
<div class="cart-container">
    <div class="cart-items" id="cart-items">
        <!-- Cart items will be dynamically added here -->
    </div>

  
    
    <!-- Delivery Note -->
    <div class="delivery-note">
        <p>Delivery charge for all districts in the country: LKR 400</p>
    </div>

    <!-- Total Amount Section -->
    <div class="total-amount" id="total-amount">
        Total Amount: LKR 0
    </div>

    <!-- Proceed Button -->
    <button class="proceed-btn" onclick="proceedToPay()">Proceed to Pay</button>
</div>

<footer>
    <p>&copy; 2025 Customized Gift Store. All Rights Reserved.</p>
</footer>

<script>
    // Load cart items from localStorage
    let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];

// Account Dropdown Functions
function showSwitchAccountDropdown() {
        const switchAccountDropdown = document.getElementById("switch-account-dropdown");
        const select = document.getElementById("switch-account");

        // Clear existing options
        select.innerHTML = '<option value="">Select Account</option>';

        // Populate dropdown with existing accounts
        const users = JSON.parse(localStorage.getItem("users")) || [];
        users.forEach(user => {
            const option = document.createElement("option");
            option.value = user.email;
            option.textContent = user.email;
            select.appendChild(option);
        });

        // Toggle dropdown visibility
        switchAccountDropdown.style.display = "block";
    }

    function switchAccount() {
        const selectedEmail = document.getElementById("switch-account").value;
        if (selectedEmail) {
            localStorage.setItem("loggedInEmail", selectedEmail);
            alert("Switched to account: " + selectedEmail);
            window.location.href = "account.html"; // Redirect to account page
        }
    }

    function addAnotherAccount() {
        alert("Redirecting to login page...");
        window.location.href = "login.html"; // Redirect to login page
    }

    function removeAccount() {
        const loggedInEmail = localStorage.getItem("loggedInEmail");
        if (loggedInEmail === "guest@example.com") {
            alert("Guest accounts cannot be removed. Please sign up to create an account.");
        } else {
            const confirmRemove = confirm("Are you sure you want to remove your account? This action cannot be undone.");
            if (confirmRemove) {
                let users = JSON.parse(localStorage.getItem("users")) || [];
                users = users.filter(user => user.email !== loggedInEmail);
                localStorage.setItem("users", JSON.stringify(users));
                localStorage.removeItem("loggedInEmail");
                alert("Account removed successfully. Redirecting to home page...");
                window.location.href = "Home.html";
            }
        }
    }


    // Function to display cart items
    function displayCartItems() {
        const cartItemsContainer = document.getElementById("cart-items");
        cartItemsContainer.innerHTML = "";

        let totalAmount = 0;

        if (cartItems.length === 0) {
            // If cart is empty, hide delivery charge and set total to 0
            document.querySelector(".delivery-note").style.display = "none";
            document.getElementById("total-amount").textContent = "Total Amount: LKR 0";
            return;
        } else {
            // If cart has items, show delivery charge
            document.querySelector(".delivery-note").style.display = "block";
        }

        cartItems.forEach((item, index) => {
            const cartItem = document.createElement("div");
            cartItem.classList.add("cart-item");

            // Extract price from the product price string (e.g., "LKR 2500")
            const price = parseInt(item.productPrice.replace("LKR ", ""));

            // Product Image and Name
            cartItem.innerHTML = `
                <img src="${item.productImg}" alt="${item.productName}">
                <div class="cart-item-details">
                    <h3>${item.productName}</h3>
                    <div class="horizontal-details">
                        <p>${item.productPrice}</p>
                        <div class="quantity-adjust">
                            <button onclick="decreaseQuantity(${index})">-</button>
                            <input type="number" value="${item.quantity || 1}" min="1" id="quantity-${index}" onchange="updateTotal()">
                            <button onclick="increaseQuantity(${index})">+</button>
                        </div>
                        <div class="price-calculation" id="price-calculation-${index}">
                            ${price} * ${item.quantity || 1} = LKR ${price * (item.quantity || 1)}
                        </div>
                    </div>
                    <div class="customization-details">
                        ${item.customPhoto ? `<p>Custom Photo: ${item.customPhoto}</p>` : ""}
                        ${item.customText ? `<p>Custom Text: ${item.customText}</p>` : ""}
                        ${item.customLogo ? `<p>Custom Logo: ${item.customLogo}</p>` : ""}
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                </div>
            `;

            cartItemsContainer.appendChild(cartItem);

            // Calculate total amount
            const quantity = item.quantity || 1;
            totalAmount += price * quantity;
        });

        // Add fixed delivery charge only if there are items in the cart
        const deliveryCharge = 400;
        totalAmount += deliveryCharge;

        // Update total amount
        document.getElementById("total-amount").textContent = `Total Amount: LKR ${totalAmount}`;
    }

    // Function to increase quantity
    function increaseQuantity(index) {
        const quantityInput = document.getElementById(`quantity-${index}`);
        quantityInput.value = parseInt(quantityInput.value) + 1;
        cartItems[index].quantity = parseInt(quantityInput.value);
        localStorage.setItem("cartItems", JSON.stringify(cartItems));
        updatePriceCalculation(index);
        updateTotal();
    }

    // Function to decrease quantity
    function decreaseQuantity(index) {
        const quantityInput = document.getElementById(`quantity-${index}`);
        if (parseInt(quantityInput.value) > 1) {
            quantityInput.value = parseInt(quantityInput.value) - 1;
            cartItems[index].quantity = parseInt(quantityInput.value);
            localStorage.setItem("cartItems", JSON.stringify(cartItems));
            updatePriceCalculation(index);
            updateTotal();
        }
    }

    // Function to update price calculation
    function updatePriceCalculation(index) {
        const price = parseInt(cartItems[index].productPrice.replace("LKR ", ""));
        const quantity = cartItems[index].quantity || 1;
        const priceCalculation = document.getElementById(`price-calculation-${index}`);
        priceCalculation.textContent = `${price} * ${quantity} = LKR ${price * quantity}`;
    }

    // Function to remove item from cart
    function removeItem(index) {
        cartItems.splice(index, 1);
        localStorage.setItem("cartItems", JSON.stringify(cartItems));
        displayCartItems();
    }

    // Function to update total amount
    function updateTotal() {
        displayCartItems();
    }

    // Function to proceed to payment
    function proceedToPay() {
        if (cartItems.length === 0) {
            alert("Your cart is empty. Please add items to proceed.");
            return;
        }
        // Redirect to payment page
        window.location.href = "Payment.html";
    }

    // Display cart items on page load
    displayCartItems();
</script>

</body>
</html>
