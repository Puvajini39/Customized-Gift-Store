<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customized Gift Store</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
           background-image: url(461a0d27a3a739233facb5be9ec2d515.jpg);
           background-position: center;
           background-size: contain;
           margin: 0;
           padding: 0;
           
        }

        /* Header */
        header {
            background-color: rgb(249, 243, 243);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: red;
            position: absolute;
            
            
        }

        .login-signup {
      position: absolute;
      top: 50px;
      left: 140px;
    }
    .login-signup button {
      margin-right: 10px;
      background-color: rgb(255, 255, 255);
      padding: 5px 10px;
      cursor: pointer;
      font-weight: bold;
      color: rgb(101, 26, 26);
      border: none;
    }
    /* Account Dropdown */
    .account-dropdown {
            position: relative;
            display: flex;
            align-items: center;
        }

        .account-dropdown-content {
            display: none;
            position: absolute;
            background-color: rgb(249, 243, 243);
            min-width: 150px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
            top: 100%;
            left: 0;
        }

        .account-dropdown-content button {
            width: 100%;
            padding: 10px;
            text-align: left;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-weight: bold;
            color: black;
        }

        .account-dropdown-content button:hover {
            background-color: #ddd;
        }

        .account-dropdown:hover .account-dropdown-content {
            display: block;
        }

        .account-logo {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a, .account-dropdown button {
            color: rgb(19, 19, 19);
            text-decoration: none;
            padding: 10px 15px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
        }

        nav a:hover, .account-dropdown button:hover {
            color: red;
        }

        .hero {
            background: url('background.jpg') no-repeat center center/cover;
            padding: 20px;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 28px;
        }


        /* Search Box */
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 5px;
            overflow: hidden;
        }

        .search-box input {
            padding: 5px;
            border: none;
            outline: none;
        }

        .search-box button {
            background:rgba(231, 38, 38, 0.911);
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
        }
      


        /* Hero Section */
        .hero {
            background: url('background.jpg') no-repeat center center/cover;
            padding: 20px;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 28px;
        }
        .hero p {
            font-size: 18px;
            max-width: 600px;
            margin: auto;
        }
        /* Contact Info Section */
        .contact-container {
            width: 40%;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.9); /* Slight transparency for readability */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .contact-container h2 {
            color: red;
            font-size: 28px;
        }

        .contact-container p {
            font-size: 18px;
            color: black;
        }

        /* Footer */
        footer {
            background: white;
            color: rgb(13, 13, 13);
            padding: 10px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

<header>  
    <div class="logo"></div>
    <img src="WhatsApp Image 2025-02-16 at 10.27.00_46874477.jpg" width="100" height="100">
    
    <div class="login-signup">
        <button onclick="window.location.href='login.html'">Login</button>
        <button onclick="window.location.href='signup.html'">Signup</button>
    </div>

    <nav>
          <!-- Account Dropdown -->
          <div class="account-dropdown">
            <img src="097d3cf1d036e549d1caa10ad9268dfe.jpg" class="account-logo" alt="Account Logo">
            <button>Account</button>
            <div class="account-dropdown-content">
                <button onclick="showSwitchAccountDropdown()">Switch Account</button>
                <button onclick="addAnotherAccount()">Add Another Account</button>
                <button onclick="removeAccount()">Remove Account</button>
                <!-- Switch Account Dropdown (hidden by default) -->
                <div id="switch-account-dropdown" style="display: none;">
                    <select id="switch-account" onchange="switchAccount()">
                        <option value="">Select Account</option>
                    </select>
                </div>
            </div>
        <a href="Home.html">HOME</a>
        <a href="About us.html">ABOUT US</a>
        <a href="All Products.html">ALL PRODUCTS</a>
        <a href="Contact us.html">CONTACT US</a>
        <a href="Cart.html"> 🛒CART</a>
        <div class="search-box">
            <input type="text" placeholder="Search products...">
            <button>🔍</button>
        </div>
    </nav>
</header>
<section class="hero">
    <h1>CUSTOMIZED GIFTS 🎁</h1>
</section>

<!-- Contact Information -->
<section class="contact-container">
    <h2>📞 Contact Us</h2>
    <p><strong>Company Name:</strong> Customized Gift Shop (PVT) Ltd.</p>
    
    <p><strong>Address:</strong> No19,Main Road,Batticaloa,Sri Lanka.</p>
    <p><strong>WhatsApp:</strong> +94 71 2752477</p>
    <p><strong>Email:</strong> customgifts@gmail.com</p>
</section>

<footer>
    <p>&copy; 2025 Customized Gift Store. All Rights Reserved.</p>
</footer>

<script>
    // Account Dropdown Functions
function showSwitchAccountDropdown() {
        const switchAccountDropdown = document.getElementById("switch-account-dropdown");
        const select = document.getElementById("switch-account");

        // Clear existing options
        select.innerHTML = '<option value="">Select Account</option>';

        // Populate dropdown with existing accounts
        const users = JSON.parse(localStorage.getItem("users")) || [];
        users.forEach(user => {
            const option = document.createElement("option");
            option.value = user.email;
            option.textContent = user.email;
            select.appendChild(option);
        });

        // Toggle dropdown visibility
        switchAccountDropdown.style.display = "block";
    }

    function switchAccount() {
        const selectedEmail = document.getElementById("switch-account").value;
        if (selectedEmail) {
            localStorage.setItem("loggedInEmail", selectedEmail);
            alert("Switched to account: " + selectedEmail);
            window.location.href = "account.html"; // Redirect to account page
        }
    }

    function addAnotherAccount() {
        alert("Redirecting to login page...");
        window.location.href = "login.html"; // Redirect to login page
    }

    function removeAccount() {
        const loggedInEmail = localStorage.getItem("loggedInEmail");
        if (loggedInEmail === "guest@example.com") {
            alert("Guest accounts cannot be removed. Please sign up to create an account.");
        } else {
            const confirmRemove = confirm("Are you sure you want to remove your account? This action cannot be undone.");
            if (confirmRemove) {
                let users = JSON.parse(localStorage.getItem("users")) || [];
                users = users.filter(user => user.email !== loggedInEmail);
                localStorage.setItem("users", JSON.stringify(users));
                localStorage.removeItem("loggedInEmail");
                alert("Account removed successfully. Redirecting to home page...");
                window.location.href = "Home.html";
            }
        }
    }

  </script>

    


</body>
</html>
