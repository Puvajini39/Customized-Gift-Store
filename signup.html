<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Customized Gift Store</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background-image: url(461a0d27a3a739233facb5be9ec2d515.jpg);
            background-position: center;
            background-size: contain;
            margin: 0;
            padding: 0;
        }

        /* Header */
        header {
            background-color: rgb(249, 243, 243);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: red;
            position: absolute;
        }

        .login-signup {
            position: absolute;
            top: 50px;
            left: 140px;
        }

        .login-signup button {
            margin-right: 10px;
            background-color: rgb(252, 247, 247);
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            color: black;
            border: none;
        }

        /* Account Section */
        .account-container {
            display: flex;
            flex-direction: column; /* Align vertically */
            justify-content: center;
            align-items: center;
            padding: 50px;
            font-size: 18px;
        }

        .account-details, .order-history {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 2000px;
            text-align: left;
            margin: 10px;
        }

        .account-details h2, .order-history h2 {
            color: rgb(149, 28, 36);
            margin-bottom: 15px;
        }

        .account-details p, .order-history p {
            margin-bottom: 10px;
        }

        /* Dropdown for Account Button */
        .account-dropdown {
            position: relative;
            display: flex;
            align-items: center;
        }

        .account-dropdown-content {
            display: none;
            position: absolute;
            background-color: rgb(249, 243, 243);
            min-width: 200px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
            top: 100%;
            left: 0;
        }

        .account-dropdown-content button {
            width: 100%;
            padding: 10px;
            text-align: left;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-weight: bold;
            color: black;
        }

        .account-dropdown-content button:hover {
            background-color: #ddd;
        }

        .account-dropdown:hover .account-dropdown-content {
            display: block;
        }

        .account-logo {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a, .account-dropdown button {
            color: rgb(19, 19, 19);
            text-decoration: none;
            padding: 10px 15px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
        }

        nav a:hover, .account-dropdown button:hover {
            color: red;
        }

        .hero {
            background: url('background.jpg') no-repeat center center/cover;
            padding: 20px;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 28px;
        }

        /* Search Box */
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 5px;
            overflow: hidden;
        }

        .search-box input {
            padding: 5px;
            border: none;
            outline: none;
        }

        .search-box button {
            background: rgba(231, 38, 38, 0.911);
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
        }

        /* Signup Section */
        .signup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signup-form {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .signup-form h2 {
            color: rgb(149, 28, 36);
            margin-bottom: 20px;
        }

        .signup-form input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .signup-form button {
            background: rgb(149, 28, 36);
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            border-radius: 5px;
        }

        .signup-form button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .signup-form button:hover:not(:disabled) {
            background: red;
        }

        .signup-form p {
            margin-top: 15px;
        }

        .signup-form a {
            color: rgb(149, 28, 36);
            text-decoration: none;
            font-weight: bold;
        }

        .signup-form a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
            display: none;
        }

        /* Footer */
        footer {
            background: white;
            color: rgb(13, 13, 13);
            padding: 10px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>  
    <div class="logo"></div>
    <img src="WhatsApp Image 2025-02-16 at 10.27.00_46874477.jpg" width="100" height="100" alt="Store Logo">
    
    <div class="login-signup">
        <button onclick="window.location.href='login.html'">Login</button>
        <button onclick="window.location.href='signup.html'">Signup</button>
        
    </div>

    <nav>
        <!-- Account Dropdown -->
        <div class="account-dropdown">
            <img src="097d3cf1d036e549d1caa10ad9268dfe.jpg" class="account-logo" alt="Account Logo">
            <button>Account</button>
            <div class="account-dropdown-content">
                <button onclick="showSwitchAccountDropdown()">Switch Account</button>
                <button onclick="addAnotherAccount()">Add Another Account</button>
                <button onclick="removeAccount()">Remove Account</button>
                <!-- Switch Account Dropdown (hidden by default) -->
                <div id="switch-account-dropdown" style="display: none;">
                    <select id="switch-account" onchange="switchAccount()">
                        <option value="">Select Account</option>
                    </select>
                </div>
            </div>
        </div>
        <a href="Home.html">HOME</a>
        <a href="About us.html">ABOUT US</a>
        <a href="All Products.html">ALL PRODUCTS</a>
        <a href="Contact us.html">CONTACT US</a>
        <a href="Cart.html"> 🛒CART</a>
        <div class="search-box">
            <input type="text" placeholder="Search products...">
            <button>🔍</button>
        </div>
    </nav>
</header>

<section class="hero">
    <h1>CUSTOMIZED GIFTS 🎁</h1>
</section>

<!-- Signup Section -->
<div class="signup-container">
    <div class="signup-form">
        <h2>Sign Up</h2>
        <div id="password-error" class="error-message">Passwords do not match!</div>
        <div id="email-error" class="error-message">Email already exists!</div>
        <input type="text" id="first-name" placeholder="First Name" required>
        <input type="text" id="surname" placeholder="Surname" required>
        <input type="date" id="dob" placeholder="Date of Birth" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="password" id="confirm-password" placeholder="Confirm Password" required>
        <button type="button" id="signup-button" disabled>Sign Up</button>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>

<footer>
    <p>&copy; 2025 Customized Gift Store. All Rights Reserved.</p>
</footer>

<script>
    // Get all input fields and the signup button
    const firstName = document.getElementById("first-name");
    const surname = document.getElementById("surname");
    const dob = document.getElementById("dob");
    const phone = document.getElementById("phone");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirm-password");
    const signupButton = document.getElementById("signup-button");

    // Function to check if all fields are filled
    function checkForm() {
        if (
            firstName.value &&
            surname.value &&
            dob.value &&
            phone.value &&
            email.value &&
            password.value &&
            confirmPassword.value
        ) {
            signupButton.disabled = false; // Enable the button
        } else {
            signupButton.disabled = true; // Disable the button
        }
    }

    // Add event listeners to all input fields
    firstName.addEventListener("input", checkForm);
    surname.addEventListener("input", checkForm);
    dob.addEventListener("input", checkForm);
    phone.addEventListener("input", checkForm);
    email.addEventListener("input", checkForm);
    password.addEventListener("input", checkForm);
    confirmPassword.addEventListener("input", checkForm);

    // Function to validate signup
    function validateSignup() {
        const firstNameValue = firstName.value;
        const surnameValue = surname.value;
        const dobValue = dob.value;
        const phoneValue = phone.value;
        const emailValue = email.value;
        const passwordValue = password.value;
        const confirmPasswordValue = confirmPassword.value;
        const passwordError = document.getElementById("password-error");
        const emailError = document.getElementById("email-error");

        // Check if passwords match
        if (passwordValue !== confirmPasswordValue) {
            passwordError.style.display = "block";
            emailError.style.display = "none";
            return;
        } else {
            passwordError.style.display = "none";
        }

        // Check if email already exists
        const users = JSON.parse(localStorage.getItem("users")) || [];
        const existingUser = users.find(user => user.email === emailValue);

        if (existingUser) {
            emailError.style.display = "block";
            return;
        } else {
            emailError.style.display = "none";
        }

        // Save user data
        const newUser = { firstName: firstNameValue, surname: surnameValue, dob: dobValue, phone: phoneValue, email: emailValue, password: passwordValue };
        users.push(newUser);
        localStorage.setItem("users", JSON.stringify(users));

        alert("Signup successful! Redirecting to login page...");
        window.location.href = "login.html";
    }

    // Add click event listener to the signup button
    signupButton.addEventListener("click", validateSignup);

    // Account Dropdown Functions
    function showSwitchAccountDropdown() {
        const switchAccountDropdown = document.getElementById("switch-account-dropdown");
        const select = document.getElementById("switch-account");

        // Clear existing options
        select.innerHTML = '<option value="">Select Account</option>';

        // Populate dropdown with existing accounts
        const users = JSON.parse(localStorage.getItem("users")) || [];
        users.forEach(user => {
            const option = document.createElement("option");
            option.value = user.email;
            option.textContent = user.email;
            select.appendChild(option);
        });

        // Toggle dropdown visibility
        switchAccountDropdown.style.display = "block";
    }

    function switchAccount() {
        const selectedEmail = document.getElementById("switch-account").value;
        if (selectedEmail) {
            localStorage.setItem("loggedInEmail", selectedEmail);
            alert("Switched to account: " + selectedEmail);
            window.location.href = "account.html"; // Redirect to account page
        }
    }

    function addAnotherAccount() {
        alert("Redirecting to login page...");
        window.location.href = "login.html"; // Redirect to login page
    }

    function removeAccount() {
        const loggedInEmail = localStorage.getItem("loggedInEmail");
        if (loggedInEmail === "guest@example.com") {
            alert("Guest accounts cannot be removed. Please sign up to create an account.");
        } else {
            const confirmRemove = confirm("Are you sure you want to remove your account? This action cannot be undone.");
            if (confirmRemove) {
                let users = JSON.parse(localStorage.getItem("users")) || [];
                users = users.filter(user => user.email !== loggedInEmail);
                localStorage.setItem("users", JSON.stringify(users));
                localStorage.removeItem("loggedInEmail");
                alert("Account removed successfully. Redirecting to home page...");
                window.location.href = "Home.html";
            }
        }
    }
</script>

</body>
</html>
